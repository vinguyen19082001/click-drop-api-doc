<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders API Documentation</title>

  <!-- Swagger UI CSS -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

  <style>
    body {
      margin: 0;
      background: #f4f6f8;
    }

    .topbar {
      background: #1e2f3f;
      color: white;
      padding: 16px 24px;
      font-size: 20px;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="topbar">Orders API - V1</div>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>
  window.onload = function () {
    SwaggerUIBundle({
      url: "https://vinguyen19082001.github.io/click-drop-api-doc/openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis
      ],
      layout: "BaseLayout"
    });
  };
</script>

</body>
</html>
