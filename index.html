<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Orders API</title>

  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />

  <style>
    body {
      margin: 0;
      background: #f4f6f8;
    }

    .topbar {
      background: #1e2f3f;
      color: white;
      padding: 18px 30px;
      font-size: 22px;
      font-weight: 600;
    }

    .swagger-ui .topbar {
      display: none;
    }

    .swagger-ui .info h2 {
      font-size: 36px;
      color: #2b3a42;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: #2ca02c;
    }

    .swagger-ui .opblock.opblock-post .opblock-summary-method {
      background: #2ca02c;
    }
  </style>
</head>

<body>

<div class="topbar">Orders API - V1</div>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>
  window.onload = function () {
    SwaggerUIBundle({
      url: "https://vinguyen19082001.github.io/click-drop-api-doc/openapi.yaml",
      dom_id: "#swagger-ui",
      deepLinking: true,
      layout: "BaseLayout",
      docExpansion: "list",
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1
    });
  };
</script>

</body>
</html>
