openapi: 3.0.0

info:
  title: Click & Drop API
  version: 1.0.0
  description: API documentation for Click & Drop integration.

servers:
  - url: https://api.yourdomain.com/v1
    description: Production server

paths:
  /version:
    get:
      summary: Get API version details
      responses:
        "200":
          description: Returns details about the API version
          content:
            application/json:
              schema:
                type: object
                properties:
                  commit:
                    type: string
                  build:
                    type: string
                  release:
                    type: string
                  releaseDate:
                    type: string
        "500":
          description: Internal Server Error
